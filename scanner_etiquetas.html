<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Scanner"/>
<title>Scanner Etiquetas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:600;color:#1a1a1a}
.topbar-sub{font-size:12px;color:#888}
.wrap{padding:16px;max-width:480px;margin:0 auto}

.mode-select{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mode-card{border:1.5px solid #e5e5e5;border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;background:#fff;transition:all .15s;user-select:none}
.mode-card.active-entrada{border-color:#1D9E75;background:#E1F5EE}
.mode-card.active-saida{border-color:#D85A30;background:#FAECE7}
.mc-icon{font-size:26px;margin-bottom:5px}
.mc-label{font-size:14px;font-weight:600}
.mc-sub{font-size:11px;color:#888;margin-top:2px}

.feedback-box{border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;border:1.5px solid #e5e5e5;background:#fff;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all .25s}
.feedback-box.ok-entrada{background:#E1F5EE;border-color:#1D9E75}
.feedback-box.ok-saida{background:#FAECE7;border-color:#D85A30}
.feedback-box.warn{background:#FAEEDA;border-color:#EF9F27}
.feedback-box.err{background:#FCEBEB;border-color:#E24B4A}
.fb-icon{font-size:30px}
.fb-title{font-size:16px;font-weight:600}
.fb-code{font-size:12px;color:#666;word-break:break-all;max-width:100%}

.cam-wrap{border-radius:14px;overflow:hidden;position:relative;margin-bottom:10px;background:#000;border:1px solid #e5e5e5}
#preview{width:100%;height:210px;object-fit:cover;display:block}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:140px;height:140px;position:relative}
.sf-tl,.sf-tr,.sf-bl,.sf-br{position:absolute;width:20px;height:20px;border-style:solid}
.sf-tl{top:0;left:0;border-color:#1D9E75;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.sf-tr{top:0;right:0;border-color:#1D9E75;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.sf-bl{bottom:0;left:0;border-color:#1D9E75;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.sf-br{bottom:0;right:0;border-color:#1D9E75;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.scan-frame.saida .sf-tl,.scan-frame.saida .sf-tr,.scan-frame.saida .sf-bl,.scan-frame.saida .sf-br{border-color:#D85A30}
.scan-line{position:absolute;left:0;right:0;height:2px;background:#1D9E75;top:50%;animation:sl 1.8s ease-in-out infinite}
.scan-frame.saida .scan-line{background:#D85A30}
@keyframes sl{0%,100%{top:8%}50%{top:88%}}

#cam-status{font-size:12px;color:#888;text-align:center;margin-bottom:10px}

.cam-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.btn{padding:12px;border:1.5px solid #ddd;border-radius:12px;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:500;transition:all .1s;user-select:none}
.btn:active{transform:scale(0.97)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.green{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.orange{background:#D85A30;color:#fff;border-color:#D85A30}
.btn.red{background:#E24B4A;color:#fff;border-color:#E24B4A}

.divider{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.divider span{font-size:12px;color:#aaa;white-space:nowrap}
.divider-line{flex:1;height:1px;background:#eee}

.manual-row{display:flex;gap:8px;margin-bottom:16px}
.manual-row input{flex:1;padding:11px 14px;border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;color:#1a1a1a;font-size:14px;outline:none}
.manual-row input:focus{border-color:#1D9E75}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;padding:12px;border:1px solid #eee}
.sc-l{font-size:11px;color:#999;margin-bottom:3px}
.sc-n{font-size:22px;font-weight:700}
.sc-n.g{color:#0F6E56}
.sc-n.o{color:#993C1D}
.sc-n.r{color:#A32D2D}

.section-title{font-size:12px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}

.hist-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid #eee}
.hist-badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
.hb-e{background:#E1F5EE;color:#085041}
.hb-s{background:#FAECE7;color:#712B13}
.hb-w{background:#FAEEDA;color:#633806}
.hist-code{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-time{font-size:11px;color:#aaa;white-space:nowrap}
.hist-date{font-size:10px;color:#bbb;white-space:nowrap;margin-top:1px;text-align:right}

.empty{text-align:center;color:#bbb;font-size:14px;padding:2rem 0}
.empty-icon{font-size:36px;margin-bottom:8px}

.bottom-btns{display:flex;gap:8px;margin-top:8px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar h1" style="font-size:17px;font-weight:600">📦 Scanner Etiquetas</div>
  </div>
  <div class="topbar-sub" id="total-badge">0 registros</div>
</div>

<div class="wrap">

  <div class="mode-select">
    <div class="mode-card active-entrada" id="card-entrada" onclick="setMode('entrada')">
      <div class="mc-icon">📥</div>
      <div class="mc-label" style="color:#085041">Entrada</div>
      <div class="mc-sub">Recebimento</div>
    </div>
    <div class="mode-card" id="card-saida" onclick="setMode('saida')">
      <div class="mc-icon">📤</div>
      <div class="mc-label" style="color:#712B13">Saída</div>
      <div class="mc-sub">Entrega</div>
    </div>
  </div>

  <div class="feedback-box" id="feedback">
    <div class="fb-icon">🔍</div>
    <div class="fb-title">Aguardando leitura</div>
    <div class="fb-code" id="fb-code">Aponte para um QR Code</div>
  </div>

  <div class="cam-wrap">
    <video id="preview" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame" id="scan-frame">
        <div class="sf-tl"></div><div class="sf-tr"></div>
        <div class="sf-bl"></div><div class="sf-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
  </div>
  <p id="cam-status">Câmera inativa</p>

  <div class="cam-btns">
    <button class="btn green" id="btn-start" onclick="startCam()">▶ Iniciar câmera</button>
    <button class="btn" id="btn-stop" onclick="stopCam()" disabled>⏹ Parar</button>
  </div>

  <div class="divider"><div class="divider-line"></div><span>ou digitar manualmente</span><div class="divider-line"></div></div>
  <div class="manual-row">
    <input type="text" id="manual-code" placeholder="Código da etiqueta..." onkeydown="if(event.key==='Enter')registerManual()"/>
    <button class="btn green" onclick="registerManual()" style="padding:11px 16px">↵</button>
  </div>

  <div class="stats">
    <div class="sc"><div class="sc-l">Entradas</div><div class="sc-n g" id="st-ent">0</div></div>
    <div class="sc"><div class="sc-l">Saídas</div><div class="sc-n o" id="st-sai">0</div></div>
    <div class="sc"><div class="sc-l">Dup. entrada</div><div class="sc-n r" id="st-de">0</div></div>
    <div class="sc"><div class="sc-l">Dup. saída</div><div class="sc-n r" id="st-ds">0</div></div>
  </div>

  <div class="section-title">Histórico recente</div>
  <div id="hist-list"></div>

  <div class="bottom-btns">
    <button class="btn" style="flex:1" onclick="exportCSV()">⬇ Exportar CSV</button>
    <button class="btn red" style="flex:1" onclick="clearAll()">🗑 Limpar tudo</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  const KEY='scan_es_v2';
  let mode='entrada', stream=null, scanLoop=null, lastCode='', lastCodeTime=0;

  function load(){try{return JSON.parse(localStorage.getItem(KEY))||[];}catch(e){return[];}}
  function save(d){localStorage.setItem(KEY,JSON.stringify(d));}

  window.setMode=function(m){
    mode=m;
    const isE=m==='entrada';
    document.getElementById('card-entrada').className='mode-card'+(isE?' active-entrada':'');
    document.getElementById('card-saida').className='mode-card'+(!isE?' active-saida':'');
    document.getElementById('scan-frame').className='scan-frame'+(isE?'':' saida');
    const bs=document.getElementById('btn-start');
    if(!bs.disabled) bs.className=isE?'btn green':'btn orange';
    showFeedback('idle','Aguardando leitura','Aponte para um QR Code');
  };

  function showFeedback(type,title,code){
    const icons={idle:'🔍',ok_entrada:'✅',ok_saida:'✅',warn:'⚠️',err:'❌'};
    const box=document.getElementById('feedback');
    box.className='feedback-box'+(type!=='idle'?' '+type:'');
    box.querySelector('.fb-icon').textContent=icons[type]||'🔍';
    box.querySelector('.fb-title').textContent=title;
    document.getElementById('fb-code').textContent=code;
  }

  function registerCode(code){
    const now=Date.now();
    if(code===lastCode&&now-lastCodeTime<2200)return;
    lastCode=code; lastCodeTime=now;
    let data=load();
    const dup=data.some(x=>x.code===code&&x.type===mode&&x.status==='ok');
    if(dup){
      data.unshift({code,type:mode,status:'duplicado',ts:new Date().toISOString()});
      save(data);
      showFeedback('warn',mode==='entrada'?'Entrada duplicada!':'Saída duplicada!',code);
      try{navigator.vibrate&&navigator.vibrate([100,50,100,50,100]);}catch(e){}
    } else {
      data.unshift({code,type:mode,status:'ok',ts:new Date().toISOString()});
      save(data);
      showFeedback(mode==='entrada'?'ok_entrada':'ok_saida',mode==='entrada'?'Entrada registrada':'Saída registrada',code);
      try{navigator.vibrate&&navigator.vibrate([60]);}catch(e){}
    }
    updateStats(); renderHist();
    setTimeout(()=>showFeedback('idle','Aguardando leitura','Aponte para um QR Code'),2500);
  }

  window.registerManual=function(){
    const inp=document.getElementById('manual-code');
    const v=inp.value.trim();
    if(!v)return;
    registerCode(v); inp.value='';
  };

  window.startCam=async function(){
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      const vid=document.getElementById('preview');
      vid.srcObject=stream;
      document.getElementById('btn-start').disabled=true;
      document.getElementById('btn-stop').disabled=false;
      document.getElementById('cam-status').textContent='Câmera ativa — aponte para o QR Code';
      startScanLoop(vid);
    }catch(e){
      document.getElementById('cam-status').textContent='Erro: permissão de câmera negada';
    }
  };

  window.stopCam=function(){
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    if(scanLoop){cancelAnimationFrame(scanLoop);scanLoop=null;}
    document.getElementById('btn-start').disabled=false;
    document.getElementById('btn-stop').disabled=true;
    document.getElementById('cam-status').textContent='Câmera inativa';
    document.getElementById('preview').srcObject=null;
  };

  function startScanLoop(vid){
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js';
    script.onload=function(){
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      function tick(){
        if(vid.readyState===vid.HAVE_ENOUGH_DATA){
          canvas.width=vid.videoWidth; canvas.height=vid.videoHeight;
          ctx.drawImage(vid,0,0);
          const img=ctx.getImageData(0,0,canvas.width,canvas.height);
          const r=jsQR(img.data,img.width,img.height);
          if(r&&r.data) registerCode(r.data);
        }
        scanLoop=requestAnimationFrame(tick);
      }
      tick();
    };
    if(window.jsQR){
      const canvas=document.createElement('canvas');
      const ctx=canvas.getContext('2d');
      function tick(){
        if(vid.readyState===vid.HAVE_ENOUGH_DATA){
          canvas.width=vid.videoWidth; canvas.height=vid.videoHeight;
          ctx.drawImage(vid,0,0);
          const img=ctx.getImageData(0,0,canvas.width,canvas.height);
          const r=jsQR(img.data,img.width,img.height);
          if(r&&r.data) registerCode(r.data);
        }
        scanLoop=requestAnimationFrame(tick);
      }
      tick();
    } else {
      document.head.appendChild(script);
    }
  }

  function updateStats(){
    const d=load();
    document.getElementById('st-ent').textContent=d.filter(x=>x.type==='entrada'&&x.status==='ok').length;
    document.getElementById('st-sai').textContent=d.filter(x=>x.type==='saida'&&x.status==='ok').length;
    document.getElementById('st-de').textContent=d.filter(x=>x.type==='entrada'&&x.status==='duplicado').length;
    document.getElementById('st-ds').textContent=d.filter(x=>x.type==='saida'&&x.status==='duplicado').length;
    document.getElementById('total-badge').textContent=d.length+' registro'+(d.length!==1?'s':'');
  }

  function renderHist(){
    const d=load().slice(0,20);
    const cont=document.getElementById('hist-list');
    if(!d.length){
      cont.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Nenhum scan ainda</div>';
      return;
    }
    cont.innerHTML=d.map(item=>{
      const t=new Date(item.ts);
      const hora=t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const data=t.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      let cls,lbl;
      if(item.status==='duplicado'){cls='hb-w';lbl=item.type==='entrada'?'Dup. entrada':'Dup. saída';}
      else if(item.type==='entrada'){cls='hb-e';lbl='Entrada';}
      else{cls='hb-s';lbl='Saída';}
      return `<div class="hist-item">
        <span class="hist-badge ${cls}">${lbl}</span>
        <span class="hist-code">${item.code}</span>
        <div style="text-align:right">
          <div class="hist-time">${hora}</div>
          <div class="hist-date">${data}</div>
        </div>
      </div>`;
    }).join('');
  }

  window.exportCSV=function(){
    const d=load();
    if(!d.length){toast('Nenhum dado para exportar');return;}
    const rows=[['Codigo','Tipo','Status','Data','Hora'],...d.map(x=>{
      const t=new Date(x.ts);
      return[x.code,x.type,x.status,t.toLocaleDateString('pt-BR'),t.toLocaleTimeString('pt-BR')];
    })];
    const csv=rows.map(r=>r.join(';')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='etiquetas_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
    toast('CSV exportado!');
  };

  window.clearAll=function(){
    if(!confirm('Apagar TODOS os registros? Esta ação não pode ser desfeita.'))return;
    save([]);updateStats();renderHist();toast('Registros apagados');
  };

  function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),2200);
  }

  updateStats(); renderHist();
})();
</script>
</body>
</html>
